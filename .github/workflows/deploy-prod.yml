name: Deploy Auth Server to On-Premise 2

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'docker-compose-auth-prod.yml'
      - '.github/workflows/deploy-prod.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew clean build -x test --no-daemon

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/auth-server:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose to Server 2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.PROD2_HOST }}
          username: ${{ secrets.PROD2_USER }}
          key: ${{ secrets.PROD2_PEM_KEY }}
          port: ${{ secrets.PROD2_SSH_PORT }}
          source: "docker-compose-auth-prod.yml"
          target: "/opt/auth/"

      - name: Setup and Execute Docker on Server 2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD2_HOST }}
          username: ${{ secrets.PROD2_USER }}
          key: ${{ secrets.PROD2_PEM_KEY }}
          port: ${{ secrets.PROD2_SSH_PORT }}
          script: |
            mkdir -p /opt/auth
            cd /opt/auth
            
            cat << 'EOF' > .env.auth
            ${{ secrets.AUTH_SERVER_ENV }}
            EOF
            
            export IMAGE_NAME=${{ github.repository }}
            docker compose -f docker-compose-auth-prod.yml --env-file .env.auth pull
            docker compose -f docker-compose-auth-prod.yml --env-file .env.auth up -d
            
            docker image prune -f