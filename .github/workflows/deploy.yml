name: CI/CD with AWS ECR

on:
  push:
    branches:
      - main

# 워크플로우에서 사용할 공통 변수 설정
env:
  AWS_REGION: ap-southeast-2
  ECR_REPOSITORY: devnogi/auth # ECR 리포지토리 이름

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # 1. 소스 코드 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # 2. AWS 자격 증명 설정
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 3. Amazon ECR에 로그인
      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4. Docker 이미지 빌드 및 ECR에 푸시
      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }} # Git 커밋 해시를 이미지 태그로 사용
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # 5. EC2에 접속하여 배포 스크립트 실행
      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_KEY }}
          script: |
            cd ~/app # docker-compose.yml 파일이 있는 경로로 이동

            # 1. EC2 서버에 .env 파일을 동적으로 생성
            # GitHub Secrets 값을 사용하여 .env 파일 내용을 덮어씁니다.
            sudo cat << EOF > .env
            # Spring Application
            SPRING_PROFILES_ACTIVE=prod
            SERVER_PORT=${{ secrets.SERVER_PORT }}
            BASE_URL=${{ secrets.BASE_URL }}
            TZ=Asia/Seoul

            # Database (MySQL)
            DB_HOST=mysql
            DB_PORT=${{ secrets.DB_PORT }}
            DB_SCHEMA=${{ secrets.DB_SCHEMA }}
            MYSQL_ROOT_PASSWORD=${{ secrets.DB_ROOT_PASSWORD }}
            MYSQL_DATABASE=${{ secrets.DB_SCHEMA }}
            MYSQL_USER=${{ secrets.DB_USER }}
            MYSQL_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}

            # JWT
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
            JWT_ACCESS_TOKEN_VALIDITY=${{ secrets.JWT_ACCESS_TOKEN_VALIDITY }}
            JWT_REFRESH_TOKEN_VALIDITY=${{ secrets.JWT_REFRESH_TOKEN_VALIDITY }}
            JWT_ISSUER=${{ secrets.JWT_ISSUER }}
            JWT_ACCESS_TOKEN_COOKIE_NAME=${{ secrets.JWT_ACCESS_TOKEN_COOKIE_NAME }}
            JWT_REFRESH_TOKEN_COOKIE_NAME=${{ secrets.JWT_REFRESH_TOKEN_COOKIE_NAME }}

            # OAuth2 Clients
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }}
            KAKAO_CLIENT_SECRET=${{ secrets.KAKAO_CLIENT_SECRET }}
            NAVER_CLIENT_ID=${{ secrets.NAVER_CLIENT_ID }}
            NAVER_CLIENT_SECRET=${{ secrets.NAVER_CLIENT_SECRET }}

            # Kafka
            KAFKA_BOOTSTRAP_SERVERS=kafka:29092

            # Redis
            REDIS_HOST=redis
            REDIS_PORT=6379

            # AWS S3
            AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }}
            AWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }}
            AWS_REGION=${{ env.AWS_REGION }}
            S3_BUCKET=${{ secrets.S3_BUCKET_NAME }}
            EOF

            # 2. ECR 로그인
            sudo aws ecr get-login-password --region ${{ env.AWS_REGION }} | sudo docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}

            # 3. Docker Compose 실행 (환경 변수 사용)
            export IMAGE_TAG=${{ github.sha }}
            
            # -E 옵션으로 환경 변수를 sudo 컨텍스트에 전달합니다.
            sudo -E docker-compose pull app
            sudo -E docker-compose up -d --remove-orphans

            # 4. 불필요한 Docker 이미지 정리
            sudo docker image prune -f