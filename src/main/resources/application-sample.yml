server:
  port: ${SERVER_PORT}
  address: 0.0.0.0
  shutdown: graceful
  error:
    whitelabel:
      enabled: false
  tomcat:
    mbeanregistry:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: [ "health" ]

spring:
  application:
    name: devnogi-auth-server
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:devnogi.auth@gmail.com}
    password: ${MAIL_PASSWORD:ipghhpopgxncgzgg}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
  web:
    resources:
      static-locations: classpath:/static/
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_SCHEMA}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: ${BASE_URL}/login/oauth2/code/google
            scope: [ openid, email ]

          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: ${BASE_URL}/login/oauth2/code/kakao
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope: [ account_email ]

          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            redirect-uri: ${BASE_URL}/login/oauth2/code/naver
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope: [ email ]

        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_batch_fetch_size: 100
  flyway:
    enabled: true
    encoding: UTF-8
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      # 값을 JSON 형태로 보내기 위한 설정
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  resources:
    static-locations: classpath:/static/
  mvc:
    contentnegotiation:
      # URL 확장자에 의한 컨텐트 타입 결정
      favor-path-extension: true
      # Accept 헤더 무시
      ignore-accept-header: true
  docker:
    compose:
      enabled: false
  cloud:
    aws:
      region:
        static: ${AWS_REGION}
      credentials:
        access-key: ${AWS_ACCESS_KEY}
        secret-key: ${AWS_SECRET_KEY}
      s3:
        endpoint: https://${OCI_NAMESPACE}.compat.objectstorage.${AWS_REGION}.oraclecloud.com
        path-style-access-enabled: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

jwt:
  secret-key: ${JWT_SECRET_KEY:e4f1a5c8d2b7e9f0a6c3d1b8e5f2c7a9d4e6f3b1a2c8d5e9f0b3a7c2d1e8f5a4}
  access-token-validity: ${JWT_ACCESS_TOKEN_VALIDITY:3600} # seconds (1 hour)
  refresh-token-validity: ${JWT_REFRESH_TOKEN_VALIDITY:86400} # seconds (1 day)
  issuer: devnogi
  access-token-cookie-name: access_token
  refresh-token-cookie-name: refresh_token


springdoc:
  swagger-ui:
    persist-authorization: true
    operations-sorter: alpha
    tags-sorter: alpha
    disable-swagger-default-url: true
    display-request-duration: true
    classification:
      readyToUseGroupName: 개발 완료 API
      workInProgressGroupName: 개발 진행중 API
      deprecatedGroupName: 더이상 유지보수되지 않는 API

decorator:
  datasource:
    p6spy:
      enable-logging: false

---
spring:
  config:
    activate:
      on-profile: default

decorator:
  datasource:
    p6spy:
      enable-logging: true

logging:
  level:
    until.the.eternity: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web.client.RestTemplate: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod

springdoc:
  swagger-ui:
    enabled: false
